workflows:
  html-to-apk:
    name: Build HTML to Android APK
    max_build_duration: 30
    environment:
      node: latest
      android_ things: default
      groups:
        - keystore_credentials # اختياري: إذا كنت تريد توقيع التطبيق لمتجر جوجل
    triggering:
      events:
        - push
      branch_patterns:
        - name: main
    scripts:
      - name: Install Capacitor and Dependencies
        script: | 
          # تهيئة حزم Node وتثبيت Capacitor
          npm init -y
          npm install @capacitor/core @capacitor/cli
          npx cap init "My HTML App" "com.example.htmlapp" --web-dir=www
          
          # تثبيت منصة الأندرويد
          npm install @capacitor/android
          npx cap add android

      - name: Prepare HTML Files
        script: |
          # إنشاء مجلد www ونقل ملفات الـ HTML والـ CSS إليه
          mkdir -p www
          cp -R *.html *.js *.css www/ || true
          
          # تحديث مشروع الأندرويد بملفات الويب الجديدة
          npx cap sync android

      - name: Build Android APK
        script: |
          # الدخول لمجلد الأندرويد وبناء ملف الـ APK غير الموقع (Debug APK)
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
